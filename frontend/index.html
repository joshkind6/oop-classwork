<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nigeria Mineral Resources</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container py-5">

    <div class="hero text-center mb-5">

        <h1 class="display-4 fw-bold">
            Nigeria Mineral Resources
        </h1>

        <p class="lead">
            Search any mineral resource and discover the Nigerian states where it can be found.
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="search-card shadow">

                <div class="input-group">

                    <span class="input-group-text">

                        <i class="fa-solid fa-magnifying-glass"></i>

                    </span>

                    <input
                    type="text"
                    class="form-control"
                    id="search"
                    placeholder="Search Gold, Coal, Limestone...">

                    <button
                    class="btn btn-primary px-4"
                    onclick="searchMineral()">

                        Search

                    </button>

                </div>

            </div>

        </div>

    </div>

    <div class="text-center mt-3">

        <button
        class="btn btn-outline-success"
        onclick="searchMineral()">

            Show All States

        </button>

    </div>

    <div
    id="results"
    class="row mt-5 g-4">

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
